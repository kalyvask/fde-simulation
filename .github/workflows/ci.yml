name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 7 * * 1"   # Mondays 07:00 UTC — live real-key eval
  workflow_dispatch:

jobs:
  prototypes:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    env:
      ANTHROPIC_API_KEY: ""   # force drafters into deterministic mock mode
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Calder — install, test, eval
        working-directory: simulations/1-full-engagement/calder-insurance/02_week2_solution/prototype
        run: |
          python -m pip install -q -r requirements.txt
          python -m pytest -q
          python scripts/run_eval.py

      - name: Helix — install, test, eval
        working-directory: simulations/1-full-engagement/helix-finance/02_week2_solution/prototype
        run: |
          python -m pip install -q -r requirements.txt
          python -m pytest -q
          python scripts/run_eval.py

  scoring:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install scoring deps
        run: python -m pip install -q -r scoring/requirements.txt
      - name: Rubric JSON template is valid
        run: python -m scoring.selftest

  live-eval:
    # Real-key eval. The push/PR `prototypes` job forces mock mode, where pass^k
    # is deterministic and `requires_llm` cases are skipped — so it can't measure
    # run-to-run variance or exercise the LLM-dependent cases. This job does both,
    # at k=5 over seed + adversarial. It runs only on schedule / manual dispatch
    # (it costs API tokens), so it never touches fork PRs. On those triggers a
    # missing ANTHROPIC_API_KEY secret FAILS the run — a live eval that silently
    # skips would masquerade as a green pass.
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Guard — ANTHROPIC_API_KEY secret must be set
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::error::ANTHROPIC_API_KEY secret is not set — the live eval cannot run."
            echo "::error::Add it under Settings > Secrets and variables > Actions, or this scheduled job will keep failing."
            exit 1
          fi

      - name: Calder — live eval (k=5, seed + adversarial)
        working-directory: simulations/1-full-engagement/calder-insurance/02_week2_solution/prototype
        run: |
          python -m pip install -q -r requirements.txt
          python scripts/run_eval.py --k 5 --cases evals/cases/seed.jsonl
          python scripts/run_eval.py --k 5 --cases evals/cases/adversarial.jsonl

      - name: Helix — live eval (k=5, seed + adversarial)
        working-directory: simulations/1-full-engagement/helix-finance/02_week2_solution/prototype
        run: |
          python -m pip install -q -r requirements.txt
          python scripts/run_eval.py --k 5 --cases evals/cases/seed.jsonl
          python scripts/run_eval.py --k 5 --cases evals/cases/adversarial.jsonl
